<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Visualizer Web</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Cytoscape JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <!-- Sidebar Controls -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>RAG Visualizer</h1>
                <p>OS Deadlock Detection</p>
            </div>

            <!-- Add Nodes -->
            <div class="control-group">
                <h3>Add Nodes</h3>
                <button id="btnAddProcess" class="btn btn-blue w-full mb-2">Add Process</button>
                <button id="btnAddResource" class="btn btn-green w-full">Add Resource</button>
            </div>

            <!-- Add Edges -->
            <div class="control-group">
                <h3>Edge Creation Mode</h3>
                <button id="btnEdgeMode" class="btn btn-purple" style="width: 100%;">Toggle Edge Mode</button>
                <p id="edgeModeHint" class="mt-2" style="display:none; font-size: 0.8rem; color: #9ca3af; margin-top: 0.5rem; line-height: 1.4;">Click a Source, then a Target.<br/>Process → Resource = Request<br/>Resource → Process = Allocation</p>
            </div>

            <!-- Management Tools -->
            <div class="control-group">
                <h3>Management</h3>
                <div class="input-row">
                    <input type="text" id="removeId" placeholder="Node/Edge ID to Remove" autocomplete="off">
                </div>
                <button id="btnRemove" class="btn btn-gray w-full">Remove Element</button>
                <div class="button-row mt-2">
                    <button id="btnUndo" class="btn btn-gray-outline" disabled>Undo</button>
                    <button id="btnRedo" class="btn btn-gray-outline" disabled>Redo</button>
                </div>
                <button id="btnReset" class="btn btn-gray-outline w-full mt-2">Reset Graph</button>
            </div>

            <!-- Deadlock Detection -->
            <div class="control-group mt-auto">
                <button id="btnCheckDeadlock" class="btn btn-red w-full lg-btn">Check Deadlock (DFS)</button>
                <button id="btnExport" class="btn btn-gray-outline w-full mt-2">Export Image</button>
            </div>
        </aside>

        <!-- Main Graph Area -->
        <main class="graph-area">
            <div id="cy"></div>
        </main>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container"></div>
    
    <!-- Floating UIs -->
    <div id="resourceHoverControls" style="display: none; position: absolute; z-index: 100; gap: 5px; flex-direction: column;">
        <button id="btnIncInst">+</button>
        <button id="btnDecInst">-</button>
    </div>
    
    <div id="nodeRenameUI" style="display: none; position: absolute; z-index: 105; background: #1e293b; padding: 5px; border-radius: 6px; box-shadow: 0 4px 10px rgba(0,0,0,0.5);">
        <input type="text" id="nodeRenameInput" autocomplete="off" style="width: 100px; padding: 4px;" />
        <div id="nodeRenameError" style="display: none; color: #ef4444; font-size: 10px; margin-top: 4px;">Name already exists</div>
    </div>

    <script src="app.js"></script>
</body>
</html>

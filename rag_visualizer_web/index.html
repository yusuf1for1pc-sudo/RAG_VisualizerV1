<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Visualizer Web</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Cytoscape JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <!-- Sidebar Controls -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>RAG Visualizer</h1>
                <p>OS Deadlock Detection</p>
            </div>

            <!-- [ CREATE ] -->
            <div class="control-group">
                <h3 style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: #9ca3af; margin-bottom: 12px;">[ CREATE ]</h3>
                <button id="btnAddProcess" class="btn btn-blue w-full mb-2">Add Process</button>
                <button id="btnAddResource" class="btn btn-green w-full">Add Resource</button>
            </div>

            <!-- [ CONNECT ] -->
            <div class="control-group">
                <h3 style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: #9ca3af; margin-bottom: 12px;">[ CONNECT ]</h3>
                <div class="toggle-wrapper" id="btnEdgeMode">
                    <span class="toggle-label">Toggle Edge Mode</span>
                    <div class="toggle-track">
                        <div class="toggle-thumb"></div>
                    </div>
                </div>
                <p id="edgeModeHint" class="mt-2" style="display:none; font-size: 0.8rem; color: #9ca3af; margin-top: 0.5rem; line-height: 1.4;">Click a Source, then a Target.<br/>Process → Resource = Request<br/>Resource → Process = Allocation</p>
            </div>

            <!-- [ EDIT ] -->
            <div class="control-group">
                <h3 style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: #9ca3af; margin-bottom: 12px;">[ EDIT ]</h3>
                <div class="toggle-wrapper" id="btnDeleteMode">
                    <span class="toggle-label">Delete Mode</span>
                    <div class="toggle-track">
                        <div class="toggle-thumb"></div>
                    </div>
                </div>
                <p id="deleteModeHint" class="mt-2" style="display:none; font-size: 0.8rem; color: #9ca3af; margin-top: 0.5rem; line-height: 1.4;">Click any Node or Edge to delete it.</p>
                
                <div class="button-row mt-2" style="margin-top: 12px;">
                    <button id="btnUndo" class="btn btn-gray-outline" disabled>Undo</button>
                    <button id="btnRedo" class="btn btn-gray-outline" disabled>Redo</button>
                </div>
                <button id="btnReset" class="btn btn-gray-outline w-full mt-2">Reset Graph</button>
            </div>

            <div style="flex-grow: 1;"></div> <!-- Spacer pushing bottom items down -->

            <!-- [ ANALYSIS ] -->
            <div class="control-group">
                <h3 style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: #9ca3af; margin-bottom: 12px;">[ ANALYSIS ]</h3>
                <button id="btnCheckDeadlock" class="btn btn-red w-full lg-btn">Check Deadlock</button>
            </div>

            <!-- [ EXPORT ] -->
            <div class="control-group" style="margin-top: -8px;">
                <h3 style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: #9ca3af; margin-bottom: 12px;">[ EXPORT ]</h3>
                <button id="btnExport" class="btn btn-gray-outline w-full">Export Image</button>
            </div>
        </aside>

        <!-- Main Graph Area -->
        <main class="graph-area">
            <div id="cy"></div>
        </main>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container"></div>
    
    <!-- Floating UIs -->
    <div id="resourceHoverControls" style="display: none; position: absolute; z-index: 100; gap: 5px; flex-direction: column;">
        <button id="btnIncInst">+</button>
        <button id="btnDecInst">-</button>
    </div>
    
    <div id="nodeRenameUI" style="display: none; position: absolute; z-index: 105; background: #1e293b; padding: 5px; border-radius: 6px; box-shadow: 0 4px 10px rgba(0,0,0,0.5);">
        <input type="text" id="nodeRenameInput" autocomplete="off" style="width: 100px; padding: 4px;" />
        <div id="nodeRenameError" style="display: none; color: #ef4444; font-size: 10px; margin-top: 4px;">Name already exists</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
